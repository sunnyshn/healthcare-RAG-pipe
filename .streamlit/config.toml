[theme]
primaryColor = "#2E7D6B"
backgroundColor = "#FBFCFC"
secondaryBackgroundColor = "#F0F4F3"
textColor = "#1A2B29"
font = "sans serif"

[server]
headless = true

[browser]
gatherUsageStats = false

[client]
# Hide Python tracebacks/code from the browser; full detail still goes to the
# server logs. Keeps the deployed demo clean for visitors.
showErrorDetails = false
